apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -f docker-compose.yml -f docker-compose.override.yml convert
    kompose.version: 1.35.0 (9532ceef3)
  labels:
    io.kompose.service: proxy
  name: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: proxy
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -f docker-compose.yml -f docker-compose.override.yml convert
        kompose.version: 1.35.0 (9532ceef3)
      labels:
        io.kompose.service: proxy
    spec:
      containers:
        - image: proxy:v1.0
          name: proxy
          ports:
            - containerPort: 8100
              protocol: TCP
          volumeMounts:
            - mountPath: /usr/local/etc/haproxy/haproxy.cfg
              name: proxy-cm0
              subPath: haproxy.cfg
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: haproxy.cfg
                path: haproxy.cfg
            name: proxy-cm0
          name: proxy-cm0
