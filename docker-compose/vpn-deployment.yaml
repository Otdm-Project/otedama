apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -f docker-compose.yml -f docker-compose.override.yml convert
    kompose.version: 1.35.0 (9532ceef3)
  labels:
    io.kompose.service: vpn
  name: vpn
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: vpn
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -f docker-compose.yml -f docker-compose.override.yml convert
        kompose.version: 1.35.0 (9532ceef3)
      labels:
        io.kompose.service: vpn
    spec:
      containers:
        - image: vpn:v1.0
          name: vpn
          ports:
            - containerPort: 51820
              protocol: UDP
            - containerPort: 8090
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/wireguard/wg0.conf
              name: vpn-cm1
              subPath: wg0.conf
            - mountPath: /home/ubuntu/otedama/docker-compose/vpn/app/start.sh
              name: vpn-cm2
              subPath: start.sh
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: wg0.conf
                path: wg0.conf
            name: vpn-cm1
          name: vpn-cm1
        - configMap:
            items:
              - key: start.sh
                path: start.sh
            name: vpn-cm2
          name: vpn-cm2
