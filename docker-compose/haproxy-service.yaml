apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose -f docker-compose.yml -f docker-compose.override.yml convert
    kompose.version: 1.35.0 (9532ceef3)
  labels:
    io.kompose.service: haproxy
  name: haproxy
spec:
  ports:
    - name: "443"
      port: 443
      targetPort: 443
    - name: "9999"
      port: 9999
      targetPort: 9999
  selector:
    io.kompose.service: haproxy
