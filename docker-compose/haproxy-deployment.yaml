apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -f docker-compose.yml -f docker-compose.override.yml convert
    kompose.version: 1.35.0 (9532ceef3)
  labels:
    io.kompose.service: haproxy
  name: haproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: haproxy
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -f docker-compose.yml -f docker-compose.override.yml convert
        kompose.version: 1.35.0 (9532ceef3)
      labels:
        io.kompose.service: haproxy
    spec:
      containers:
        - image: haproxy:2.8
          name: haproxy
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          ports:
            - containerPort: 443
              protocol: TCP
            - containerPort: 9999
              protocol: TCP
          volumeMounts:
            - mountPath: /usr/local/etc/haproxy/haproxy.cfg
              name: haproxy-cm0
              subPath: haproxy.cfg
      restartPolicy: Always
      volumes:
        - configMap:
            items:
              - key: haproxy.cfg
                path: haproxy.cfg
            name: haproxy-cm0
          name: haproxy-cm0
